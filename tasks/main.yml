---
# zigbee2mqtt — native install of Zigbee2MQTT on Debian (git + pnpm build) with a
# templated configuration.yaml and a systemd service. Runs as root (set become
# in the consuming play). The service connects to the coordinator on first
# start, so a working serial port and MQTT broker are needed for it to stay up.

- name: Assert frontend ssl_cert and ssl_key are set together
  # z2m enables HTTPS by the presence of both. Half-set is a silent foot-gun
  # (it'd just serve plain HTTP and the user wouldn't know), so fail fast.
  # Only relevant in template mode; in repo mode the committed config owns this.
  when: zigbee2mqtt_manage_configuration
  ansible.builtin.assert:
    that:
      - (zigbee2mqtt_frontend_ssl_cert | length > 0) ==
        (zigbee2mqtt_frontend_ssl_key  | length > 0)
    fail_msg: >-
      zigbee2mqtt_frontend_ssl_cert and zigbee2mqtt_frontend_ssl_key must
      either both be set (HTTPS) or both empty (HTTP) — not one of each.

- name: Install build prerequisites (without nodejs/npm — see NodeSource below)
  ansible.builtin.apt:
    name:
      - git
      - build-essential
      - python3
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
    cache_valid_time: 3600

# Node.js comes from NodeSource (deb.nodesource.com), not Debian. Z2M 2.x
# requires Node 22+ and Debian 13 ships Node 20. This is the same path the
# upstream z2m install guide recommends. The keyring lives in /etc/apt/keyrings
# (the modern signed-by convention; apt-key is deprecated).
- name: Ensure /etc/apt/keyrings exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: NodeSource signing key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /etc/apt/keyrings/nodesource.asc
    owner: root
    group: root
    mode: "0644"

- name: NodeSource apt source
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/nodesource.list
    content: |
      deb [signed-by=/etc/apt/keyrings/nodesource.asc] https://deb.nodesource.com/node_{{ zigbee2mqtt_node_major }}.x nodistro main
    owner: root
    group: root
    mode: "0644"

- name: Install nodejs (from NodeSource — includes npm)
  # state: latest is deliberate: on a system that already has Debian's
  # nodejs installed (e.g. from a previous run of this role at v1.1.0 or
  # an earlier provisioning), state: present sees "nodejs already there"
  # and won't upgrade across the Debian → NodeSource source boundary,
  # leaving Node 20 in place — too old for z2m 2.x. state: latest forces
  # the upgrade to the highest-priority source (NodeSource 22.x), then
  # tracks 22.x patch releases on subsequent runs.
  # update_cache here picks up the NodeSource source above on the same run
  # without a separate refresh task; cache_valid_time:0 forces a refresh
  # in case the previous "Install build prerequisites" task's cache is
  # fresh but predates the NodeSource entry.
  ansible.builtin.apt:
    name: nodejs
    state: latest  # noqa: package-latest
    update_cache: true
    cache_valid_time: 0

- name: Install pnpm globally
  # NodeSource's nodejs ships with npm, so this works without the Debian npm
  # package. Don't pin pnpm — npm picks the latest version compatible with the
  # installed Node (Node major is the variable we control).
  ansible.builtin.command: npm install -g pnpm
  args:
    creates: /usr/local/bin/pnpm

- name: Create the zigbee2mqtt group
  ansible.builtin.group:
    name: "{{ zigbee2mqtt_group }}"
    system: true

- name: Create the zigbee2mqtt user
  ansible.builtin.user:
    name: "{{ zigbee2mqtt_user }}"
    group: "{{ zigbee2mqtt_group }}"
    groups: dialout
    append: true
    system: true
    home: "{{ zigbee2mqtt_base_dir }}"
    create_home: false
    shell: /usr/sbin/nologin

- name: Ensure base directory exists
  # Created before the clone — ansible.builtin.git refuses to clone into a
  # non-empty directory, so this stays empty until the next task.
  ansible.builtin.file:
    path: "{{ zigbee2mqtt_base_dir }}"
    state: directory
    owner: root
    group: "{{ zigbee2mqtt_group }}"
    mode: "0755"

- name: Check out Zigbee2MQTT at the pinned version
  ansible.builtin.git:
    repo: "{{ zigbee2mqtt_repo }}"
    dest: "{{ zigbee2mqtt_base_dir }}"
    version: "{{ zigbee2mqtt_version }}"
    depth: 1
  register: zigbee2mqtt_src
  notify: Restart zigbee2mqtt

- name: Ensure data directory exists
  # Created after the clone so it's safe whether data_dir is under base_dir
  # or elsewhere (the default makes it a sibling of base_dir).
  ansible.builtin.file:
    path: "{{ zigbee2mqtt_data_dir }}"
    state: directory
    owner: "{{ zigbee2mqtt_user }}"
    group: "{{ zigbee2mqtt_group }}"
    mode: "0750"

# Detect whether a prior install/build completed. "src unchanged" alone is
# not a safe proxy: a previous run could have cloned successfully but failed
# at pnpm install (e.g. wrong Node version), leaving the tree without
# node_modules/dist. Re-run install/build whenever src changed OR the
# expected output is missing.
- name: Stat node_modules
  ansible.builtin.stat:
    path: "{{ zigbee2mqtt_base_dir }}/node_modules"
  register: zigbee2mqtt_node_modules

- name: Stat build output
  ansible.builtin.stat:
    path: "{{ zigbee2mqtt_base_dir }}/dist"
  register: zigbee2mqtt_dist

- name: Install Zigbee2MQTT dependencies  # noqa: no-handler
  # Must run in-order after checkout and before the service starts, so it is a
  # change-gated task, not an end-of-play handler.
  ansible.builtin.command:
    cmd: pnpm install --frozen-lockfile
    chdir: "{{ zigbee2mqtt_base_dir }}"
  when: zigbee2mqtt_src is changed or not zigbee2mqtt_node_modules.stat.exists
  changed_when: true
  notify: Restart zigbee2mqtt

- name: Audit npm dependencies for high-severity issues
  # Informational only — z2m's --frozen-lockfile already pins every
  # transitive dep, but pnpm audit surfaces CVEs disclosed since the
  # z2m tag we're pinned to was cut, giving the operator a paper trail
  # at deploy time. The real fix when something turns up is bumping
  # zigbee2mqtt_version after reviewing the lockfile diff.
  ansible.builtin.command:
    cmd: pnpm audit --audit-level=high
    chdir: "{{ zigbee2mqtt_base_dir }}"
  register: zigbee2mqtt_audit
  changed_when: false
  failed_when: false

- name: Show pnpm audit summary
  ansible.builtin.debug:
    msg: "{{ zigbee2mqtt_audit.stdout_lines | default(['(no audit output)']) }}"

- name: Build Zigbee2MQTT  # noqa: no-handler
  ansible.builtin.command:
    cmd: pnpm build
    chdir: "{{ zigbee2mqtt_base_dir }}"
  when: zigbee2mqtt_src is changed or not zigbee2mqtt_dist.stat.exists
  changed_when: true
  notify: Restart zigbee2mqtt

# --- Config ownership: template mode vs repo mode -----------------------------
# Template mode (default): the role renders configuration.yaml. Repo mode
# (zigbee2mqtt_manage_configuration=false): the data dir is git-owned, so the
# role must NOT write configuration.yaml — z2m's runtime-managed network_key/
# devices state lives there and would be clobbered. See defaults/main.yml.

- name: Deploy configuration.yaml (template mode)
  when: zigbee2mqtt_manage_configuration
  ansible.builtin.template:
    src: configuration.yaml.j2
    dest: "{{ zigbee2mqtt_data_dir }}/configuration.yaml"
    owner: "{{ zigbee2mqtt_user }}"
    group: "{{ zigbee2mqtt_group }}"
    mode: "0640"
  notify: Restart zigbee2mqtt

- name: Stat configuration.yaml (repo mode — decides first-deploy bootstrap)
  when: not zigbee2mqtt_manage_configuration
  ansible.builtin.stat:
    path: "{{ zigbee2mqtt_data_dir }}/configuration.yaml"
  register: zigbee2mqtt_cfg

- name: Bootstrap the data dir from the git remote on first deploy (repo mode)
  # init+fetch+checkout (not `git clone`) so it works even though the playbook
  # pre-stages TLS material under data/tls/ — clone refuses a non-empty dest,
  # this overlays the repo onto it. Runs once: skipped as soon as
  # configuration.yaml exists. Never fetches again afterwards — the host is the
  # source of truth at runtime (HSH-038), so no auto-pull can clobber a live
  # devices.yaml. Greenfield/disaster-recovery only; an already-seeded host
  # (e.g. migrated by hand) just skips this.
  when:
    - not zigbee2mqtt_manage_configuration
    - zigbee2mqtt_data_git_remote | length > 0
    - not zigbee2mqtt_cfg.stat.exists
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      cd {{ zigbee2mqtt_data_dir | quote }}
      git init -q
      git remote add origin {{ zigbee2mqtt_data_git_remote | quote }} \
        2>/dev/null || git remote set-url origin {{ zigbee2mqtt_data_git_remote | quote }}
      git fetch -q --depth 1 origin {{ zigbee2mqtt_data_git_branch | quote }}
      git checkout -q -f -B {{ zigbee2mqtt_data_git_branch | quote }} FETCH_HEAD
    executable: /bin/bash
  changed_when: true
  notify: Restart zigbee2mqtt

- name: Ensure data dir ownership after bootstrap (repo mode)
  when:
    - not zigbee2mqtt_manage_configuration
    - zigbee2mqtt_data_git_remote | length > 0
    - not zigbee2mqtt_cfg.stat.exists
  ansible.builtin.file:
    path: "{{ zigbee2mqtt_data_dir }}"
    owner: "{{ zigbee2mqtt_user }}"
    group: "{{ zigbee2mqtt_group }}"
    recurse: true

- name: Stat data dir .git (repo mode — gate origin-URL upkeep)
  when: not zigbee2mqtt_manage_configuration
  ansible.builtin.stat:
    path: "{{ zigbee2mqtt_data_dir }}/.git"
  register: zigbee2mqtt_dotgit

- name: Keep origin pointed at the data repo (repo mode, already a git repo)  # noqa: command-instead-of-module
  # No fetch/pull — only corrects the remote URL if it drifts. Safe on a live
  # host because it never touches the working tree. The git module can't set a
  # remote URL without also cloning/pulling, which is exactly what we must not
  # do here, so a bare `git remote set-url` is the right tool.
  when:
    - not zigbee2mqtt_manage_configuration
    - zigbee2mqtt_data_git_remote | length > 0
    - zigbee2mqtt_dotgit.stat.exists
  ansible.builtin.command:
    cmd: git -C {{ zigbee2mqtt_data_dir }} remote set-url origin {{ zigbee2mqtt_data_git_remote }}
  register: zigbee2mqtt_origin
  changed_when: false
  failed_when: false

- name: Template .gitignore into the data dir (repo mode)
  # Keeps secrets and transient/binary state out of the committed repo.
  when: not zigbee2mqtt_manage_configuration
  ansible.builtin.template:
    src: gitignore.j2
    dest: "{{ zigbee2mqtt_data_dir }}/.gitignore"
    owner: "{{ zigbee2mqtt_user }}"
    group: "{{ zigbee2mqtt_group }}"
    mode: "0644"

- name: Configure operator git commit identity (repo mode)
  # Commits pushed from the host (operator over SSH, become root) otherwise
  # attribute to root@<host>. Non-destructive — blockinfile, not a full rewrite.
  when:
    - not zigbee2mqtt_manage_configuration
    - zigbee2mqtt_data_git_user_name | length > 0
    - zigbee2mqtt_data_git_user_email | length > 0
  ansible.builtin.blockinfile:
    path: "/root/.gitconfig"
    create: true
    owner: root
    group: root
    mode: "0644"
    block: |
      [user]
      	name = {{ zigbee2mqtt_data_git_user_name }}
      	email = {{ zigbee2mqtt_data_git_user_email }}

- name: Deploy secret.yaml from the vault (resolved via !secret in config)
  # Mode-independent: write it whenever secrets are supplied. Gitignored above.
  when: zigbee2mqtt_secret | length > 0
  ansible.builtin.template:
    src: secret.yaml.j2
    dest: "{{ zigbee2mqtt_data_dir }}/secret.yaml"
    owner: "{{ zigbee2mqtt_user }}"
    group: "{{ zigbee2mqtt_group }}"
    mode: "0640"
  notify: Restart zigbee2mqtt
  no_log: true

- name: Install the systemd unit
  ansible.builtin.template:
    src: zigbee2mqtt.service.j2
    dest: "/etc/systemd/system/{{ zigbee2mqtt_service }}.service"
    owner: root
    group: root
    mode: "0644"
  notify: Restart zigbee2mqtt

- name: Enable and start Zigbee2MQTT
  ansible.builtin.systemd:
    name: "{{ zigbee2mqtt_service }}"
    enabled: true
    state: started
    daemon_reload: true
