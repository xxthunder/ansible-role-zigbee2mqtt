---
# Role argument spec for zigbee2mqtt. Validated at role start. Structural defaults
# live in defaults/main.yml (values not restated here, to avoid drift).
#
# Requires ansible-core >= 2.11.

argument_specs:
  main:
    short_description: Zigbee2MQTT on Debian (native install + systemd).
    description:
      - Installs Zigbee2MQTT from git at a pinned tag (pnpm build), templates
        configuration.yaml, and manages the systemd service. See README.md.
    options:

      # --- Required (set in the consumer's vars / vault) ---------------------

      zigbee2mqtt_serial_port:
        type: str
        required: true
        description:
          - Coordinator serial path. Use a stable /dev/serial/by-id/... entry,
            never /dev/ttyUSBx.

      zigbee2mqtt_mqtt_user:
        type: str
        required: true
        description: MQTT username for the broker.

      zigbee2mqtt_mqtt_password:
        type: str
        required: true
        no_log: true
        description: MQTT password (supply via vault).

      # --- Structural defaults (defaults/main.yml owns the values) -----------

      zigbee2mqtt_version:
        type: str
        description: Zigbee2MQTT git tag to deploy.

      zigbee2mqtt_repo:
        type: str
        description: Zigbee2MQTT git repository URL.

      zigbee2mqtt_node_major:
        type: str
        description:
          - Node.js major version installed from NodeSource. Z2M 2.x
            requires Node 22+; Debian 13 ships Node 20, so the distro
            package is too old.

      zigbee2mqtt_user:
        type: str
        description: Service user.

      zigbee2mqtt_group:
        type: str
        description: Service group.

      zigbee2mqtt_base_dir:
        type: str
        description: Source/build directory (root-owned, read by the service).

      zigbee2mqtt_data_dir:
        type: str
        description: Config/state directory (owned by the service user).

      zigbee2mqtt_service:
        type: str
        description: systemd service name.

      zigbee2mqtt_serial_adapter:
        type: str
        description: Coordinator adapter (e.g. zstack for CC2652, ember for EFR32).

      zigbee2mqtt_channel:
        type: int
        description: Zigbee channel — fix before first pairing.

      zigbee2mqtt_network_key:
        type: raw
        description: Network key, or "GENERATE".

      zigbee2mqtt_pan_id:
        type: raw
        description: PAN ID, or "GENERATE".

      zigbee2mqtt_ext_pan_id:
        type: raw
        description: Extended PAN ID, or "GENERATE".

      zigbee2mqtt_mqtt_server:
        type: str
        description:
          - MQTT broker URL. Use mqtt:// for plaintext or mqtts:// for TLS;
            with mqtts://, set zigbee2mqtt_mqtt_ca to validate the broker
            cert.

      zigbee2mqtt_mqtt_base_topic:
        type: str
        description: MQTT base topic.

      zigbee2mqtt_mqtt_ca:
        type: str
        description:
          - Path on the host to the CA file that signs the broker cert.
            Empty disables CA validation; non-empty turns on broker-cert
            verification. Combine with an mqtts:// URL.

      zigbee2mqtt_frontend_enabled:
        type: bool
        description: Enable the web frontend.

      zigbee2mqtt_frontend_port:
        type: int
        description: Frontend TCP port.

      zigbee2mqtt_frontend_host:
        type: str
        description: Frontend bind address.

      zigbee2mqtt_frontend_ssl_cert:
        type: str
        description:
          - Path on the host to the frontend's TLS certificate (PEM). Set
            alongside zigbee2mqtt_frontend_ssl_key to enable HTTPS; leave
            both empty for plain HTTP.

      zigbee2mqtt_frontend_ssl_key:
        type: str
        description:
          - Path on the host to the frontend's TLS private key (PEM). See
            zigbee2mqtt_frontend_ssl_cert.

      zigbee2mqtt_frontend_auth_token:
        type: str
        # no_log: this is a secret bearer token; keep it out of play output.
        no_log: true
        description:
          - Shared bearer token protecting the web frontend (z2m's native
            frontend.auth_token). Empty (default) leaves the frontend open;
            set it to require the token on the UI, REST API, and websocket.
            Single shared secret, not per-user auth — source it from a vault.

      zigbee2mqtt_homeassistant:
        type: bool
        description: Enable Home Assistant MQTT discovery.

      zigbee2mqtt_log_level:
        type: str
        description: Zigbee2MQTT log level.

      # --- Config ownership / repo mode -------------------------------------

      zigbee2mqtt_manage_configuration:
        type: bool
        description:
          - When true (default) the role templates configuration.yaml
            (template mode). When false (repo mode) the role does not touch
            configuration.yaml — the git-owned data dir owns it — so z2m's
            runtime-managed network_key/devices state is never clobbered.

      zigbee2mqtt_data_git_remote:
        type: str
        description:
          - Repo mode only. SSH URL of the data-dir git repo. Empty disables
            git involvement. On first deploy (no configuration.yaml) the role
            bootstraps the dir from this remote; it never auto-pulls after.

      zigbee2mqtt_data_git_branch:
        type: str
        description: Repo mode branch to track (default main).

      zigbee2mqtt_data_git_user_name:
        type: str
        description:
          - Repo mode. git user.name written to the host's ~/.gitconfig so
            operator commits attribute correctly. Empty leaves it alone.

      zigbee2mqtt_data_git_user_email:
        type: str
        description: Repo mode. git user.email for operator commits.

      zigbee2mqtt_secret:
        type: dict
        no_log: true
        description:
          - Key/value secrets rendered to data/secret.yaml (mode 0640,
            gitignored) and resolved in configuration.yaml via z2m's
            `!secret <key>`. Typical keys network_key, mqtt_password,
            frontend_auth_token. Supply values from the consumer's vault.
