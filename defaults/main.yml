---
# Version (git tag) of Zigbee2MQTT to deploy. Bump deliberately.
zigbee2mqtt_version: "2.10.1"
zigbee2mqtt_repo: "https://github.com/Koenkk/zigbee2mqtt.git"

# Node.js major version installed from NodeSource. Z2M 2.x requires Node 22+;
# Debian 13 trixie ships Node 20, so the distro package is too old. NodeSource
# (deb.nodesource.com) is what z2m's own install guide uses. Bump deliberately;
# z2m may track newer Node faster than this default does.
zigbee2mqtt_node_major: "22"

# Install layout. base_dir holds the cloned Zigbee2MQTT source tree + pnpm
# build artefacts (root-owned, read by the service user). data_dir is the
# runtime state — configuration.yaml, devices.yaml, the SQLite database,
# any TLS cert material — surfaced to z2m via the ZIGBEE2MQTT_DATA env var
# the systemd unit sets, and owned by the service user.
#
# Both sit under a single project-named umbrella in /opt/zigbee2mqtt/ so
# related artefacts cluster naturally. base_dir and data_dir are siblings,
# not parent/child, so the caller can pre-stage material under data_dir/
# (e.g. TLS certs under data/tls/) without making base_dir non-empty —
# ansible.builtin.git refuses to clone into a non-empty directory.
zigbee2mqtt_user: zigbee2mqtt
zigbee2mqtt_group: zigbee2mqtt
zigbee2mqtt_base_dir: /opt/zigbee2mqtt/base
zigbee2mqtt_data_dir: /opt/zigbee2mqtt/data
zigbee2mqtt_service: zigbee2mqtt

# Coordinator serial — use a stable /dev/serial/by-id/... path. Required.
# Adapter: zstack for TI CC2652 (e.g. Sonoff ZBDongle-P); ember for EFR32 (-E).
zigbee2mqtt_serial_port: ""
zigbee2mqtt_serial_adapter: "zstack"

# Zigbee network. Set the channel BEFORE first pairing — changing it later
# forces re-pairing every device.
zigbee2mqtt_channel: 20
zigbee2mqtt_network_key: "GENERATE"
zigbee2mqtt_pan_id: "GENERATE"
zigbee2mqtt_ext_pan_id: "GENERATE"

# MQTT broker. Required user/password — supply via the consumer's vault.
# For MQTTS, switch the URL scheme to mqtts:// (e.g. mqtts://localhost:8883)
# and set zigbee2mqtt_mqtt_ca to the CA file that signs the broker cert.
zigbee2mqtt_mqtt_server: "mqtt://localhost:1883"
zigbee2mqtt_mqtt_base_topic: "zigbee2mqtt"
zigbee2mqtt_mqtt_user: ""
zigbee2mqtt_mqtt_password: ""
zigbee2mqtt_mqtt_ca: ""

# Web frontend. Leave both ssl_* paths empty for plain HTTP; set both for
# HTTPS — z2m enables TLS by their presence. Paths point at files the caller
# has already laid down on the host; the role does not ship cert material.
zigbee2mqtt_frontend_enabled: true
zigbee2mqtt_frontend_port: 8080
zigbee2mqtt_frontend_host: "0.0.0.0"
zigbee2mqtt_frontend_ssl_cert: ""
zigbee2mqtt_frontend_ssl_key: ""

# Frontend authentication: a single shared bearer token (z2m's native
# frontend.auth_token). Empty ⇒ no auth (open frontend), preserving prior
# behaviour; set ⇒ the UI, REST API, and websocket all require the token.
# This is one shared secret, not per-user accounts — front the frontend with a
# reverse proxy if you need real SSO. Source it from a vault, never hard-code.
zigbee2mqtt_frontend_auth_token: ""

# Home Assistant MQTT discovery (leave off unless HA also consumes the bus).
zigbee2mqtt_homeassistant: false

# Logging.
zigbee2mqtt_log_level: info

# -----------------------------------------------------------------------------
# Config ownership mode.
#
# true  (default) — TEMPLATE MODE: the role renders configuration.yaml from the
#                   vars above. Simple for greenfield, but the role then OWNS
#                   the file — and z2m rewrites its own network_key/pan_id/
#                   ext_pan_id and devices map into it at runtime, so a later
#                   re-render reverts that runtime state (mesh reset). Fine
#                   until the first device is paired.
# false           — REPO MODE: the role does NOT touch configuration.yaml. The
#                   data dir is owned by a git repo (cloned on first deploy);
#                   secrets come from a vault-deployed secret.yaml (see below)
#                   referenced via z2m's `!secret`. The role can't clobber
#                   runtime state because it never writes the config.
zigbee2mqtt_manage_configuration: true

# Repo mode wiring. data_git_remote empty ⇒ no git involvement.
# On first deploy (empty data dir) the role clones the remote; on an already
# populated dir it only ensures `origin` points at the remote and NEVER pulls
# (the host is the source of truth at runtime — pulling could clobber a live
# devices.yaml mid-pairing). Use an SSH URL so push works via agent forwarding.
zigbee2mqtt_data_git_remote: ""
zigbee2mqtt_data_git_branch: "main"

# Git commit identity written to the service user's ~/.gitconfig so operator
# commits from the host attribute correctly (otherwise they show as root@host).
# Both empty ⇒ the role leaves ~/.gitconfig alone.
zigbee2mqtt_data_git_user_name: ""
zigbee2mqtt_data_git_user_email: ""

# Secrets rendered to {{ data_dir }}/secret.yaml (mode 0640, gitignored),
# resolved in configuration.yaml via z2m's `!secret <key>`. Empty ⇒ no
# secret.yaml is written. Typical keys: network_key, mqtt_password,
# frontend_auth_token. Supply the values from the consumer's vault.
zigbee2mqtt_secret: {}
